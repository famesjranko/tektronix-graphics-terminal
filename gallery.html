<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tektronix Gallery</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="gallery-container">
    <!-- Header -->
    <header class="gallery-header">
      <h1>Tektronix Gallery</h1>
      <a href="index.html" class="btn btn-icon" data-tooltip="Open Canvas">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </a>
    </header>

    <!-- Category Filter Tabs -->
    <nav class="category-tabs" id="category-tabs">
      <button class="category-tab active" data-category="all">All</button>
      <button class="category-tab" data-category="geometric">Geometric</button>
      <button class="category-tab" data-category="3d">3D</button>
      <button class="category-tab" data-category="data">Data</button>
      <button class="category-tab" data-category="maps">Maps</button>
      <button class="category-tab" data-category="technical">Technical</button>
    </nav>

    <!-- Main Content Area -->
    <main class="gallery-main">
      <!-- Demo Grid View -->
      <div class="demo-grid" id="demo-grid">
        <!-- Demo cards will be populated by gallery-app.js -->
        <!-- Example structure:
        <div class="demo-card" data-demo-id="spirograph">
          <div class="demo-thumbnail">
            <canvas></canvas>
          </div>
          <div class="demo-info">
            <div class="demo-name">Spirograph</div>
            <div class="demo-category">Geometric</div>
          </div>
        </div>
        -->
      </div>

      <!-- Player View (hidden by default) -->
      <div class="player-view" id="player-view">
        <!-- Player Header -->
        <div class="player-header">
          <button class="back-btn" id="back-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Back</span>
          </button>
          <h2 id="player-title">Demo Name</h2>
          <div class="player-header-spacer"></div>
          <button class="btn" id="open-in-editor-btn">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" style="margin-right: 6px;">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Open in Editor
          </button>
        </div>

        <!-- Player Canvas Area -->
        <div class="player-canvas-area" id="player-canvas-container">
          <!-- TekCanvas will be created here by GraphicPlayer -->
        </div>

        <!-- Player Controls -->
        <div class="player-controls">
          <!-- Playback Controls -->
          <div class="control-group">
            <button class="btn btn-icon" id="restart-btn" data-tooltip="Restart">
              <svg viewBox="0 0 24 24">
                <polygon points="5 4 5 20 8 20 8 4"/>
                <polygon points="11 4 11 20 21 12"/>
              </svg>
            </button>
            <button class="btn btn-icon" id="play-pause-btn" data-tooltip="Play/Pause">
              <svg viewBox="0 0 24 24" id="play-icon">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <svg viewBox="0 0 24 24" id="pause-icon" class="hidden">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
            </button>
          </div>

          <!-- Speed Control -->
          <div class="control-group">
            <label for="player-speed">Speed:</label>
            <div class="slider-container">
              <input type="range" id="player-speed" min="0" max="4" value="2" step="1">
              <span class="status-value" id="player-speed-label">Normal</span>
            </div>
          </div>

          <!-- Parameter Sliders (dynamic, populated by JS) -->
          <div class="param-sliders" id="param-sliders">
            <!-- Example structure:
            <div class="param-slider">
              <label for="param-R">R:</label>
              <input type="range" id="param-R" min="0.1" max="0.5" value="0.4" step="0.01">
              <span class="param-value">0.4</span>
            </div>
            -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/gallery-app.js"></script>
</body>
</html>
